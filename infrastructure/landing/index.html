<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Quiz - Daily Football Trivia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #1A1A2E;
      color: #F5F5F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #52B788; }
    .subtitle { font-size: 1.1rem; color: #F5F5F0cc; margin-bottom: 2rem; }
    .badges { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .badge {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      background-color: #2D5A27;
      color: #F5F5F0;
      font-weight: 700;
      text-decoration: none;
      border: 2px solid #52B788;
      transition: background 0.2s;
    }
    .badge:hover { background-color: #52B788; }
    .footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #6C757D;
    }
  </style>
</head>
<body>
  <div class="logo">&#9917;</div>
  <h1>Football Quiz</h1>
  <p class="subtitle">Daily Football Trivia &mdash; Guess the mystery player!</p>
  <div class="badges">
    <a href="#" class="badge">App Store</a>
    <a href="#" class="badge">Google Play</a>
  </div>
  <p class="footer">&copy; 2026 Football Quiz. All rights reserved.</p>
</body>
</html>
